name: Update data and deploy to Pages

on:
  schedule:
    - cron: "30 11 * * *"   # 매일 11:30 UTC (≈ 한국 20:30). GitHub cron은 UTC 기준.
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest data
        run: python update_data.py

      - name: Commit updated data (history, optional)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gi
